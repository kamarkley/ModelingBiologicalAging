        <rect x="200" y="2" width="425" height="16" rx="2" fill="#2563eb"/>
        <line x1="611" y1="10" x2="639" y2="10" stroke="#0f172a" stroke-width="1.5"/>
        <line x1="611" y1="6" x2="611" y2="14" stroke="#0f172a" stroke-width="1.5"/>
