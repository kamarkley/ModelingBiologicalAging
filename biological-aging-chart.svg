<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%">
    <rect width="800" height="480" fill="#ffffff"/>

    <text x="40" y="35" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Permutation Feature Importance (Elastic Net)</text>
    <text x="40" y="55" font-family="Segoe UI, sans-serif" font-size="12" font-weight="400" fill="#64748b">Optimized Pure Lasso Baseline (l1_ratio: 1.0) | Target: Mean Telomere Length</text>
    <line x1="40" y1="65" x2="760" y2="65" stroke="#cbd5e1" stroke-width="1"/>

    <g stroke="#f1f5f9" stroke-width="1">
        <line x1="200" y1="65" x2="200" y2="440"/>
        <line x1="340" y1="65" x2="340" y2="440"/>
        <line x1="480" y1="65" x2="480" y2="440"/>
        <line x1="620" y1="65" x2="620" y2="440"/>
        <line x1="760" y1="65" x2="760" y2="440"/>
    </g>

    <g font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">
        <text x="200" y="455">0.00</text>
        <text x="340" y="455">0.10</text>
        <text x="480" y="455">0.20</text>
        <text x="620" y="455">0.30</text>
        <text x="760" y="455">0.40</text>
    </g>

    <g transform="translate(0, 80)">
