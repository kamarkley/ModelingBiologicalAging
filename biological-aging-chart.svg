    <line x1="200" y1="65" x2="200" y2="440" stroke="#475569" stroke-width="1.5"/>
    
    <g transform="translate(480, 415)" font-family="Segoe UI, sans-serif" font-size="11" font-weight="500">
        <rect width="12" height="12" rx="2" fill="#6366f1"/>
        <text x="18" y="10" fill="#475569">Socioeconomic / Demographics</text>
        
